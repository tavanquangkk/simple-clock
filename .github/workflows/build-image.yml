name: Build and Push to GitLab Registry

on:
    push:
        branches: main
    workflow_dispatch: # Cho phép trigger manual

env:
    GITLAB_REGISTRY: registry.gitlab.com
    GITLAB_PROJECT: taquangku-group/taquangku-project

jobs:
    build-and-push:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v3

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v2

            - name: Login to GitLab Container Registry
              uses: docker/login-action@v2
              with:
                  registry: ${{ env.GITLAB_REGISTRY }}
                  username: ${{ secrets.GITLAB_USERNAME }}
                  password: ${{ secrets.GITLAB_TOKEN }}

            - name: Build and push Docker image
              uses: docker/build-push-action@v4
              with:
                  context: .
                  push: true
                  tags: |
                      ${{ env.GITLAB_REGISTRY }}/${{ env.GITLAB_PROJECT }}:latest
                      ${{ env.GITLAB_REGISTRY }}/${{ env.GITLAB_PROJECT }}:${{ github.sha }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - name: Show pushed image
              run: |
                  echo "✅ Image pushed successfully!"
                  echo "📦 ${{ env.GITLAB_REGISTRY }}/${{ env.GITLAB_PROJECT }}:${{ github.sha }}"
                  echo "📦 ${{ env.GITLAB_REGISTRY }}/${{ env.GITLAB_PROJECT }}:latest"
